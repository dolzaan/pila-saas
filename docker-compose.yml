version: '3.3'

services:
  evolution-api:
    image: evoapicloud/evolution-api:latest
    container_name: evolution_api
    ports:
      - "8080:8080"
    environment:
      - SERVER_URL=http://localhost:8080
      - AUTHENTICATION_API_KEY=finzap-chave-secreta-123
      - AUTHENTICATION_EXPOSE_IN_ENV=true
      - DATABASE_PROVIDER=postgresql
      - DATABASE_CONNECTION_URI=postgresql://evo:evo@evolution-postgres:5432/evolution?schema=public
      - DATABASE_CONNECTION_CLIENT_NAME=evolution_api
    depends_on:
      - evolution-postgres
    volumes:
      - ./evolution_instances:/evolution/instances
      - ./evolution_store:/evolution/store

  evolution-postgres:
    image: postgres:15-alpine
    container_name: evolution_postgres
    environment:
      - POSTGRES_USER=evo
      - POSTGRES_PASSWORD=evo
      - POSTGRES_DB=evolution

  web:
    build:
      context: .
    container_name: finzap_web
    ports:
      - "3000:3000"
    env_file:
      - .env
    depends_on:
      - evolution-api
      - evolution-postgres
